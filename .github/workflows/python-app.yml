name: Manual Global Security Analysis

on:
  # מאפשר הפעלה ידנית בלחיצת כפתור
  workflow_dispatch:
  
  # מפעיל אוטומטית בכל פעם שאתה מעלה קוד
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4
        
    - name: Run Analysis & Generate NASA Report
      run: |
        # הרצת הקובץ המאוחד שיצרנו
        python3 analysis.py

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    
    - name: Archive Security Report
      uses: actions/upload-artifact@v4
      with:
        name: NASA-Security-Report
        path: index.html
        retention-days: 5
