name: Global Security CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Run Unified Analysis and Tests
      run: |
        # פקודה פשוטה שמריצה את הכל בקובץ אחד
        python3 analysis.py
